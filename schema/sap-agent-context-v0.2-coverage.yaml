    required_kinds: [external_reference, sap_app, sap_object, sap_field, field_map, test_pattern]
    required_dimensions: [source_traceability, configuration_app, business_object, field_mapping, test_coverage]
  - id: v02_finance_ap_supplier_invoice
    intent: fo.workflow
