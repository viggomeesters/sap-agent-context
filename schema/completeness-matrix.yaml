schema_version: 1
scope:
  id: sap_fo_starter_coverage
  title: SAP FO starter coverage for McCoy implementation design
  definition: 'Complete means no known critical or important gaps for generating McCoy Functioneel Ontwerp context
    bundles across the representative SAP FO domains listed here. It does not claim exhaustive global SAP product
    coverage.

    '
minimums:
  items_total: 50
  required_access_classes:
  - public
  - gated
  - internal_derived
  required_kinds:
  - access_policy
  - decision_rule
  - external_reference
  - field_map
  - fo_pattern
  - sap_app
  - sap_object
  - sap_role
  - scope_item
  - test_pattern
quality_contract:
  description: 'Representative bundles must prove that they can support concrete FO sections, not only that they
    contain the right knowledge item kinds.

    '
  dimensions:
    source_traceability: Public or gated citation with a concrete URL is present.
    configuration_app: A SAP app or configuration surface is selected.
    business_object: A SAP business object or comparable object anchor is selected.
    field_mapping: A field_map item is selected.
    process_flow: At least one selected item is explicitly useful for fo.process_flow.
    decision_rule: A decision_rule item is selected.
    test_coverage: A test_pattern item is selected.
    authorization_role: A sap_role item is selected.
    access_policy: An access_policy item is selected.
