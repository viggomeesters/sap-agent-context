schema_version: 1
description: Human-readable contract for canonical SAP Agent Context items.
required:
  - id
  - title
  - kind
  - status
  - access
  - requires_login
  - sap_product
  - topics
  - used_for
  - summary
  - freshness
  - source
  - claims
enums:
  kind:
    - access_policy
    - decision_rule
    - external_reference
    - field_map
    - fo_pattern
    - sap_app
    - sap_field
    - sap_object
    - sap_role
    - scope_item
    - test_pattern
  status:
    - active
    - draft
    - deprecated
  access:
    - public
    - gated
    - internal_derived
freshness:
  valid_from: YYYY-MM-DD
  review_after: YYYY-MM-DD
  expires_at: YYYY-MM-DD
  retrieved_at: YYYY-MM-DD
source:
  kind: public_url | gated_url | internal_pattern | derived_summary
  title: Human-readable source title.
  url: Required for public and gated external references.
  retrieved_at: YYYY-MM-DD
  license_note: Short reuse rule, for example link-only or internal-derived.
  specificity: Optional root_pointer | exact_page | catalog_entry | internal_pattern.
requires_source_specificity: Optional exact | high when root pointers are not sufficient.
release_applicability:
  edition: Optional SAP edition or product family this item is curated for.
  verification: Optional note describing tenant or release checks before FO use.
claims:
  - statement: Curated claim, written in our own words.
    evidence:
      - Existing knowledge item id or URL evidence pointer.
relations:
  apps: []
  objects: []
  roles: []
  scope_items: []
  fields: []
  fo_patterns: []
sap_field:
  field_definitions:
    - key: Stable field key, for example SupplierInvoice.GrossAmount.
      sap_structure: Optional SAP structure name when reviewed.
      sap_field: Optional SAP technical field name when reviewed.
      description: Human-readable field meaning written in our own words.
      usage: How agents should use the field in functional design or mapping output.
