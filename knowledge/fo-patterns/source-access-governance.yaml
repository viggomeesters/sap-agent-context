  retrieved_at: 2026-06-21
  license_note: Internal-derived rule; safe to store and reuse.
claims:
  - statement: A context bundle may cite gated SAP pointers, but downstream tools must expose the access limitation.
    evidence: [sap.ref.sap-for-me-gated-support]
relations:
