id: sap.fo-pattern.source-access-governance
title: Source access governance for SAP FO drafting
kind: fo_pattern
status: active
access: internal_derived
requires_login: false
sap_product: cross_sap
topics: [source-governance, citations, gated-sources, fo-quality]
used_for: [fo.source_traceability, fo.assumptions, fo.risk_notes]
summary: >
  FO generators should distinguish public SAP references, gated SAP references,
  internal-derived implementation knowledge and customer-specific evidence.
  Gated pointers can support traceability, but missing access must become an
  explicit assumption or verification task.
