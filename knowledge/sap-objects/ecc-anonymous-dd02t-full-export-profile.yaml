curation_policy:
- rule: publish_scoped_generic_metadata
  outcome: Publish table texts only when tied to reviewed DD03VT field catalogs, known SAP standard objects or explicit curation
    scope.
- rule: exclude_customer_namespace
  outcome: Do not publish raw Z*, Y* or unknown slash-namespace object names from tenant exports.
- rule: exclude_generated_inventory
  outcome: Do not publish generated query/BW/table inventories such as /1BCDWB*, /BI0* or /BIC* from a tenant export.
- rule: profile_full_exports
  outcome: Keep aggregate counts, language coverage and curation decisions as context without mirroring the full source-system
    catalog.
