claims:
  - statement: DD03VT is a useful in-system source for generic SAP table field metadata, including technical field names and language-dependent field labels.
    evidence:
      - sap.ref.ddic-dd03vt-field-catalog-extract
  - statement: DD02T is a useful in-system source for language-dependent SAP table and view texts, especially when agents need table labels for SE16N-driven analysis.
    evidence:
      - sap.ref.ddic-table-and-transaction-catalogs
  - statement: DD02L is a useful companion source for technical SAP table and view metadata when DD02T provides the language-dependent text.
    evidence:
      - sap.ref.ddic-table-and-transaction-catalogs
  - statement: TSTC and TSTCT are useful in-system sources for SAP transaction code definitions and language-dependent transaction labels; TSTCP is a useful companion source for parameter transactions.
    evidence:
      - sap.ref.ddic-table-and-transaction-catalogs
