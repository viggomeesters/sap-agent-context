summary: >
  In-system SAP Dictionary and transaction catalog tables can be used as
  lookup routes for generic SAP metadata. DD03VT is useful for table field
  catalogs and field labels; DD02T is useful for language-dependent table or
  view texts; DD02L is useful for technical table or view metadata; TSTC is
  useful for transaction code definitions; TSTCT is useful for
  language-dependent transaction texts; TSTCP is useful for parameter
  transaction definitions. Store only curated generic metadata in this
  repository; do not store tenant exports, table contents, screenshots,
  transaction usage evidence from a customer system or project-specific values.
