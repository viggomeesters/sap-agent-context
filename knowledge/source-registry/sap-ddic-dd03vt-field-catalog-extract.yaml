summary: >
  In-system SAP Dictionary view DD03VT can be used as a generic field catalog
  extraction route for SAP table metadata, including technical field names,
  positions, key indicators, data elements, domains and language-dependent
  labels. Store only curated generic metadata in this repository; do not store
  tenant exports, table contents, screenshots or project-specific values.
