- id: sap.test-pattern.gui-command-field-and-alv-reset
  title: SAP GUI command field and ALV reset test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - command-field
  - ok-code
  - /n
  - /o
  - /h
  - alv
  - "&reset_excel"
  - spreadsheet
  - export
  used_for:
  - fo.test_scenarios
  - fo.navigation
  - fo.quality_gate
  summary: 'Test pattern: SAP GUI answers must distinguish command prefixes/function codes from transaction codes
    and must route ALV remembered spreadsheet format issues to &RESET_EXCEL with an ALV-screen caveat.'
  freshness: *freshness
  source: *sap_gui_source
  test_scenarios:
  - name: Reset remembered spreadsheet format
    given: A user says SE16N spreadsheet export always chooses XLSX after selecting always use this format.
    when: Bundle is built for ALV export reset &RESET_EXCEL.
    then: The answer tells them to open an ALV output, enter &RESET_EXCEL in the command/OK-code field, press Enter,
      and retry export.
  - name: Command field prefix distinction
    given: A user asks what can be typed in the SAP GUI command field.
    when: Bundle is built for SAP GUI command field OK-code prefixes.
    then: The answer distinguishes transaction navigation prefixes such as /n and /o from screen-specific function
      codes such as &RESET_EXCEL.
  claims:
  - statement: Tests protect against treating &RESET_EXCEL as a transaction code and against fake tcodes formed by
      prefix characters.
    evidence:
    - sap.rule.gui.ok-code-prefix-semantics
    - sap.rule.gui.alv-reset-excel-format
  relations:
    objects:
    - sap.object.gui.command-field-ok-code
    - sap.object.gui.alv-grid-spreadsheet-export
