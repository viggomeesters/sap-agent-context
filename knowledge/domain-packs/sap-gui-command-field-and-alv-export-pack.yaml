- id: sap.rule.gui.ok-code-prefix-semantics
  title: SAP GUI command field prefixes and common commands
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - command-field
  - ok-code
  - /n
  - /o
  - /i
  - /h
  - /nend
  - /nex
  - transaction-prefix
  - fake-tcode
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule: distinguish SAP GUI command prefixes from transaction codes. /n plus a transaction starts
    the transaction in the current session, /o plus a transaction opens a new session/window where available, /i
    closes the current session, /h requests ABAP debugging where authorized, /nend logs off with confirmation and
    /nex exits quickly without the normal confirmation flow. Confidence: medium internal_derived; verify local GUI
    behavior and authorizations.'
  freshness: *freshness
  source: *sap_gui_source
  rules:
  - if: user writes /n followed by a transaction code
    then: explain it as current-session navigation prefix plus transaction code
    outcome: ready with prefix caveat
  - if: user writes /o followed by a transaction code
    then: explain it as new-session/window navigation prefix plus transaction code where available
    outcome: ready with GUI/client caveat
  - if: user writes a leading N or O as if it were part of a tcode, such as NMM03 or OSE16N
    then: do not treat that as a validated tcode; consider whether they meant /nMM03 or /oSE16N
    outcome: correct prefix semantics or ask for clarification
  - if: user asks about /h
    then: explain it as an ABAP debugging request that depends on authorization and system settings
    outcome: ready with authorization caveat
  claims:
  - statement: Prefixes such as /n and /o are command-field prefixes, not transaction-code characters.
    evidence:
    - sap.object.gui.command-field-ok-code
  relations:
    objects:
    - sap.object.gui.command-field-ok-code
- id: sap.object.gui.alv-grid-spreadsheet-export
  title: SAP GUI ALV grid spreadsheet export behavior
  kind: sap_object
  status: active
  access: public
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - alv
  - spreadsheet
  - export
  - excel
  - xlsx
  - se16n
  - "&reset_excel"
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.test_scenarios
  summary: 'ALV grid spreadsheet export can remember a user-specific chosen format when the user selects an always-use
    option. In an ALV output screen, the OK-code/function code &RESET_EXCEL can reset that remembered spreadsheet
    export format so the selection dialog appears again. Confidence: high for SAP Help-described ALV reset pattern;
    verify whether a specific report uses standard ALV and whether the current SAP GUI/client honors the function
    code.'
  freshness: *freshness
  source: &sap_help_alv_reset
    kind: public_url
    title: SAP Help ALV spreadsheet export format reset
    url: https://help.sap.com/docs/SUPPORT_CONTENT/abap/3353526046.html
    retrieved_at: '2026-06-26'
    specificity: exact_page
    license_note: Link-only public SAP Help evidence pointer; wording in this repository is a derived summary.
  claims:
  - statement: '&RESET_EXCEL is an ALV-related OK-code/function code for deleting the remembered spreadsheet export
      format choice; it should be entered while an ALV list/grid output is active.
      '
    evidence:
    - sap.rule.gui.alv-reset-excel-format
  relations:
    objects:
    - sap.object.gui.command-field-ok-code
    source_references:
    - sap.ref.gui.alv-spreadsheet-export-help
- id: sap.rule.gui.alv-reset-excel-format
  title: Reset remembered ALV spreadsheet export format with &RESET_EXCEL
  kind: decision_rule
  status: active
  access: public
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - alv
  - spreadsheet
  - export
  - excel
  - xlsx
  - always-use-this-format
  - "&reset_excel"
  - se16n
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule: when SAP GUI ALV spreadsheet export always chooses a remembered format, instruct the user
    to open an ALV output screen, enter &RESET_EXCEL in the command/OK-code field, press Enter, then retry spreadsheet
    export. If unavailable or ineffective, the report may not be standard ALV or the user-specific setting may need
    administrator maintenance. Confidence: high for the generic ALV reset pattern; tenant behavior can vary.'
  freshness: *freshness
  source: *sap_help_alv_reset
  rules:
  - if: user says spreadsheet export always chooses XLSX because always-use-this-format was selected
    then: instruct them to enter &RESET_EXCEL in the SAP GUI command/OK-code field while an ALV output list is active
    outcome: reset remembered ALV spreadsheet format choice
  - if: '&RESET_EXCEL does not work'
    then: check whether the current output is a standard ALV grid/list and consider user-specific ALV setting maintenance
    outcome: escalate with ALV/report/client caveat
  - if: user asks whether &RESET_EXCEL is a transaction
    then: explain that it is a function/OK-code interpreted by the current ALV screen, not a transaction code
    outcome: ready with command-field caveat
  claims:
  - statement: '&RESET_EXCEL belongs in the command/OK-code field on an ALV output screen and is not typed into table
      selection fields such as SE16N selection criteria.
      '
    evidence:
    - sap.object.gui.alv-grid-spreadsheet-export
  relations:
    objects:
    - sap.object.gui.command-field-ok-code
    - sap.object.gui.alv-grid-spreadsheet-export
