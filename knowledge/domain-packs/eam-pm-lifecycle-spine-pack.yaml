- id: sap.field-set.eam-pm-lifecycle-planning
  title: EAM/PM lifecycle planning field set
  kind: sap_field
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics: [eam, plant-maintenance, maintenance-plan, task-list, measuring-point, work-center, settlement, field-set]
  used_for: [fo.field_mapping, fo.test_data, fo.quality_gate]
  summary: 'Minimal lifecycle field-set context for FO questions: maintenance plan, task list group/counter,
    measuring point, counter reading unit, work center, order, technical completion and settlement caveat.'
  freshness: *freshness
  source: *source_internal_lifecycle
  claims:
  - statement: EAM/PM lifecycle field mapping should separate planning anchors, execution anchors and settlement caveats before generating an FO.
    evidence: [sap.object.eam-maintenance-plan, sap.object.eam-task-list, sap.object.eam-measuring-point-counter, sap.object.eam-work-center, sap.object.eam-settlement-caveat]
  relations:
    objects: [sap.object.eam-maintenance-plan, sap.object.eam-task-list, sap.object.eam-measuring-point-counter, sap.object.eam-work-center, sap.object.eam-settlement-caveat]
  field_definitions:
  - key: MaintenancePlan
    description: Maintenance plan identifier/context.
    usage: Use only as planning anchor; verify strategy/cycle/call behavior in tenant.
  - key: TaskListGroupCounter
    description: Task list group/counter context.
    usage: Distinguish reusable task list from executed order operation.
  - key: MeasuringPointCounter
    description: Measuring point/counter context.
    usage: Verify object assignment, unit and reading behavior.
  - key: WorkCenter
    description: Work center context.
    usage: Verify plant, capacity/cost relevance and responsible organization.
  - key: SettlementReceiver
    description: Settlement receiver/profile caveat context.
    usage: Treat as FI/CO-specific and tenant-verified, not generic EAM default.
- id: sap.rule.eam.pm-lifecycle-fail-closed
  title: EAM/PM lifecycle fail-closed rule
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics: [eam, plant-maintenance, maintenance-plan, task-list, measuring-point, counter, work-center, settlement, permit, safety, quality-gate]
  used_for: [fo.business_rules, fo.quality_gate, fo.test_scenarios]
  summary: 'Decision rule for lifecycle answers: fail closed on tenant-specific plan strategy, task-list type,
    measuring point units, work-center costing/capacity, permits/safety and settlement profile/receiver.'
  freshness: *freshness
  source: *source_internal_lifecycle
  rules:
  - if: question asks for exact maintenance plan cycle, strategy, call horizon or generated order behavior
    then: request tenant/release evidence before finalizing
    outcome: fail closed with explicit FO question
  - if: question asks for settlement receiver/profile or costing behavior
    then: do not infer from EAM object context alone
    outcome: route to FI/CO tenant verification
  - if: question asks for permits or safety steps
    then: do not invent regulatory/process approvals
    outcome: capture as tenant-specific compliance question
  claims:
  - statement: EAM/PM lifecycle generation must fail closed on configuration-heavy planning, safety and settlement details.
    evidence: [sap.object.eam-maintenance-plan, sap.object.eam-settlement-caveat, sap.object.eam-permit-safety]
  relations:
    objects: [sap.object.eam-maintenance-plan, sap.object.eam-task-list, sap.object.eam-measuring-point-counter, sap.object.eam-work-center, sap.object.eam-settlement-caveat, sap.object.eam-permit-safety]
- id: sap.test-pattern.eam-pm-lifecycle-spine-coverage
  title: EAM/PM lifecycle spine coverage test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics: [eam, plant-maintenance, maintenance-plan, task-list, measuring-point, counter, work-center, technical-completion, settlement, permit, safety, test-pattern]
  used_for: [fo.test_scenarios, fo.quality_gate]
  summary: 'Test pattern for lifecycle spine questions: a bundle should include planning anchors, task-list/work-center
    context, measuring point/counter caveats and settlement/safety fail-closed rules.'
  freshness: *freshness
  source: *source_internal_lifecycle
  test_scenarios:
  - name: Maintenance plan to work order lifecycle
    given: A consultant asks for the EAM/PM lifecycle from preventive plan to order closeout.
    when: The context bundle is built.
    then: It includes maintenance plan, task list, work center, measuring point/counter, technical completion and settlement/safety caveats.
  claims:
  - statement: EAM/PM lifecycle tests should prove the repo covers more than equipment display/navigation.
    evidence: [sap.rule.eam.pm-lifecycle-fail-closed]
  relations:
    objects: [sap.object.eam-maintenance-plan, sap.object.eam-task-list, sap.object.eam-measuring-point-counter, sap.object.eam-work-center, sap.object.eam-technical-completion, sap.object.eam-settlement-caveat, sap.object.eam-permit-safety]
