- id: sap.object.eam-technical-completion
  title: EAM technical completion lifecycle state
  kind: sap_object
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics: [eam, plant-maintenance, maintenance-order, technical-completion, teco, confirmation, settlement]
  used_for: [fo.process_flow, fo.business_rules, fo.test_scenarios]
  summary: Technical completion is an order lifecycle milestone/caveat for stopping or closing technical execution context. Do not equate it with financial settlement or business completion without tenant process evidence.
  freshness: *freshness
  source: *source_internal_lifecycle
  claims:
  - statement: Technical completion, confirmation and settlement are separate FO topics and must not be collapsed into one generic done state.
    evidence: [sap.ref.eam.pm.sap-help-lifecycle-search]
  relations:
    related_objects: [sap.object.eam-maintenance-order, sap.object.eam-settlement-caveat]
