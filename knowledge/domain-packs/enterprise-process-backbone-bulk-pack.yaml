  relations:
    objects:
    - sap.bulk.record-to-report.object
    field_maps:
    - sap.bulk.record-to-report.field-map
  test_scenarios:
  - name: Record to Report happy path
    given: A synthetic JournalEntry example with object, field map and owner context.
    when: An agent drafts posting and reconciliation FO content.
    then: The bundle cites source pointers and states tenant verification needs.
  - name: Record to Report generic prompt fail closed
    given: A vague dashboard or process prompt without concrete object/field/source signals.
    when: The retrieval bundle is built.
    then: The result remains needs_curation or asks for follow-up context.
