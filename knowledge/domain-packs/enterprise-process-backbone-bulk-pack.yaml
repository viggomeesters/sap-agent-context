  - fo.quality_gate
  - fo.test_data
  summary: 'Test pattern for Record to Report: prove object identity, mapped fields, status/exception handling,
    and fail-closed behavior for generic prompts.'
  freshness: *id001
  source: *id004
  claims:
  - statement: Record to Report FO context should keep period close readiness explicit, source-labelled, and separate
      from tenant-specific configuration before agents use it for delivery work.
    evidence:
