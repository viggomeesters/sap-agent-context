- id: sap.bulk.record-to-report.rule
  title: Record to Report decision rule
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - finance
  - record-to-report
  - general-ledger
  - period-close
  - accounting
  - decision-rule
  - quality-gate
  used_for:
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule for Record to Report: do not claim readiness unless source, object, field-map, owner and
    test signals are present.'
  freshness: *id001
  source: *id004
  claims:
  - statement: Record to Report FO context should keep period close readiness explicit, source-labelled, and separate
      from tenant-specific configuration before agents use it for delivery work.
    evidence:
    - sap.bulk.record-to-report.ref-api
  relations:
    objects:
    - sap.bulk.record-to-report.object
    field_maps:
    - sap.bulk.record-to-report.field-map
  rules:
  - if: Missing CompanyCode or lifecycle status
    then: block final FO claim
    outcome: request Record to Report owner verification
  - if: Generic dashboard/report wording without object or field anchors
    then: mark bundle needs_curation
    outcome: fail closed instead of hallucinating readiness
