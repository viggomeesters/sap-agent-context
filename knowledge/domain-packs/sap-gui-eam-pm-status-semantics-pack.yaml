- id: sap.rule.eam.pm.ie03-display-vs-ie02-change
  title: IE03 display versus IE02 change caveat
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - sap-gui
  - eam
  - ie03
  - ie02
  - display
  - change
  - equipment
  - status
  - authorization
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule: IE03 is display/open equipment context; IE02 is change equipment context. Do not tell
    a user to change statuses in IE03; use tenant-specific verification for whether status changes are possible/authorized
    in IE02 or related configuration.'
  freshness: *id001
  source: *id002
  rules:
  - if: question asks where to see system/user statuses
    then: use IE03 display/status context with caveat
    outcome: ready as display guidance
  - if: question asks how to change user status/status profile
    then: do not claim IE03 changes it
    outcome: route to change/configuration caveat and tenant verification
  claims:
  - statement: IE03/IE02 distinction prevents display navigation from being confused with status maintenance or
      configuration.
    evidence:
    - sap.app.eam.pm.ie03
    - sap.app.eam.pm.ie02
  relations:
    apps:
    - sap.app.eam.pm.ie03
    - sap.app.eam.pm.ie02
- id: sap.rule.eam.pm-status-answer-contract
  title: EAM/PM status answer contract
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - sap-gui
  - eam
  - system-status
  - user-status
  - status-profile
  - difference
  - verschil
  - tenant-caveat
  - waar
  - zie
  - gebruiker
  - statussen
  - systeem
  - ie03
  - equipment
  used_for:
  - fo.business_rules
  - fo.navigation
  - fo.quality_gate
  summary: 'Answer contract: system status is SAP/system-controlled lifecycle/status context; user status is customer-configurable
    through a status profile; status profile controls/organizes possible user statuses and related business-transaction
    effects. Exact values, labels and controls require tenant verification. Confidence: medium internal_derived.
    Supports Dutch IE03 questions: waar zie ik gebruiker statussen en systeem statussen bij equipment.'
  freshness: *id001
  source: *id002
  rules:
  - if: question asks difference between system status and user status
    then: explain system-controlled vs user/status-profile configured
    outcome: ready with caveat
  - if: question asks exact status values/profile configuration
    then: do not invent tenant values
    outcome: request tenant verification
  claims:
  - statement: 'A correct EAM/PM status answer must name all three concepts: system status, user status and status
      profile.'
    evidence:
    - sap.object.eam-system-status
    - sap.object.eam-user-status
    - sap.object.eam-status-profile
  relations:
    objects:
    - sap.object.eam-system-status
    - sap.object.eam-user-status
    - sap.object.eam-status-profile
