pack_id: sap-roles-catalogs-controls-bulk-pack
title: SAP roles catalogs and controls bulk context pack
description: Bulk generic access-control context for SAP Agent Context. Uses responsibility profiles and synthetic
  test patterns, not real tenant permission profiles, identities or exports.
ownership:
  owner: sap-agent-context
  review_strategy: Controls are generic and synthetic; tenant-specific role/catalog/user evidence belongs outside
    the public repo.
freshness_current: &id001
  valid_from: '2026-06-23'
  review_after: '2026-12-23'
  expires_at: '2027-06-23'
  retrieved_at: '2026-06-23'
items:
- id: sap.bulk.control.finance-close.role
  title: Finance Close responsibility profile
  kind: sap_role
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - finance-close
  - responsibility-control
  - segregation-of-duties
  - approval-boundary
  - synthetic-identity
  - control-evidence
  used_for:
  - fo.test_data
  summary: Generic responsibility profile for Finance Close. It describes the business activity/persona to test
    without inventing tenant-specific permission profile names.
  freshness: *id001
  source: &id002
    kind: internal_pattern
    title: Internal SAP responsibility/control pattern
    url: ''
    retrieved_at: '2026-06-23'
    specificity: internal_pattern
    license_note: Internal-derived generic control pattern; no tenant role names, user IDs, client data or copied
      SAP documentation.
  claims:
  - statement: Finance Close control context should document segregation between posting and period close approval,
      positive and negative synthetic identities, control dimensions and evidence owner before an agent treats access
      as implementation-ready.
    evidence:
    - sap.bulk.control.finance-close.access-policy
  relations:
    access_policies:
    - sap.bulk.control.finance-close.access-policy
- id: sap.bulk.control.finance-close.decision-rule
  title: Finance Close control decision rule
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - finance-close
  - responsibility-control
  - segregation-of-duties
  - approval-boundary
  - synthetic-identity
  - control-evidence
  used_for:
  - fo.quality_gate
  summary: 'Decision rule for Finance Close: verify positive control, negative restriction, owner approval and post-change
    evidence before final FO sign-off.'
  freshness: *id001
  source: *id002
  claims:
  - statement: Finance Close control context should document segregation between posting and period close approval,
      positive and negative synthetic identities, control dimensions and evidence owner before an agent treats access
      as implementation-ready.
    evidence:
    - sap.bulk.control.finance-close.access-policy
  relations:
    roles:
    - sap.bulk.control.finance-close.role
  rules:
  - if: positive synthetic identity lacks the required activity
    then: block access-ready claim
    outcome: request responsibility/control evidence
  - if: negative synthetic identity can perform the restricted activity
    then: block release
    outcome: raise segregation-of-duties defect
- id: sap.bulk.control.finance-close.test-pattern
  title: Finance Close control test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - finance-close
  - responsibility-control
  - segregation-of-duties
  - approval-boundary
  - synthetic-identity
  - control-evidence
  used_for:
  - fo.test_scenarios
  - fo.quality_gate
  summary: 'Test pattern for Finance Close: positive identity, negative identity, restriction dimension, approval
    owner and retest evidence.'
  freshness: *id001
  source: *id002
  claims:
  - statement: Finance Close control context should document segregation between posting and period close approval,
      positive and negative synthetic identities, control dimensions and evidence owner before an agent treats access
      as implementation-ready.
    evidence:
    - sap.bulk.control.finance-close.access-policy
  relations:
    roles:
    - sap.bulk.control.finance-close.role
  test_scenarios:
  - name: Finance Close positive access smoke
    given: A synthetic synthetic identity assigned to posting reviewer.
    when: The user performs the expected business activity.
    then: The action succeeds and evidence is attached without exposing real identity values.
  - name: Finance Close negative restriction smoke
    given: A synthetic synthetic identity without the responsibility profile.
    when: The user attempts the restricted activity.
    then: The action is unavailable or blocked and the FO records the control dimension.
- id: sap.bulk.control.finance-close.access-policy
  title: Finance Close control evidence policy
  kind: access_policy
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - finance-close
  - responsibility-control
  - segregation-of-duties
  - approval-boundary
  - synthetic-identity
