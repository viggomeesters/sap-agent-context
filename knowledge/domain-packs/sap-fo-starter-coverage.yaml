pack_id: sap-fo-starter-coverage
title: SAP FO starter coverage domain pack
description: >
  Canonical starter coverage for representative SAP FO generation domains.
  Public items are link-first pointers; internal-derived items are curated FO
  implementation patterns and do not mirror SAP documentation.
ownership:
  owner: sap-agent-context
  review_strategy: >
    This pack intentionally groups starter-domain slices until a domain has
    enough source-specific material to justify a separate file. Keep changes
    reviewable by editing one domain block at a time.
  split_policy: >
    Split a domain out of this pack when it gains exact source anchors,
    release-specific variants, or more than one scenario per domain.
freshness_current: &freshness_current
  valid_from: 2026-06-22
  review_after: 2026-12-22
  retrieved_at: 2026-06-22
sap_help_source: &sap_help_source
  kind: public_url
  title: SAP Help Portal - SAP S/4HANA Cloud Public Edition
  url: https://help.sap.com/docs/SAP_S4HANA_CLOUD
  retrieved_at: 2026-06-22
  specificity: root_pointer
  license_note: Link-first pointer; verify exact availability per release and tenant.
sap_api_source: &sap_api_source
  kind: public_url
  title: SAP Business Accelerator Hub
  url: https://api.sap.com/
  retrieved_at: 2026-06-22
  specificity: root_pointer
  license_note: Link-first pointer; verify exact API package, authentication and release.
internal_source: &internal_source
  kind: internal_pattern
  title: Internal SAP FO starter coverage pattern
  url: ""
  retrieved_at: 2026-06-22
  specificity: internal_pattern
  license_note: Internal-derived implementation pattern; safe to store and reuse.
items:
  - id: sap.policy.source-access-and-tenant-boundaries
    title: Source access and tenant-boundary policy
    kind: access_policy
    status: active
    access: internal_derived
    requires_login: false
    sap_product: cross_sap
    topics: [authorization, access, governance, gated-source, tenant, customer-specific]
    used_for: [fo.source_traceability, fo.authorization, fo.risk_notes]
    summary: >
      Policy item that separates public SAP pointers, gated SAP resources,
      internal-derived patterns and customer/tenant-specific evidence.
    freshness: *freshness_current
    source: *internal_source
    claims:
      - statement: Customer-specific tenant evidence must not be promoted into the generic KB without an explicit access and tenant label.
        evidence: [sap.fo-pattern.source-access-governance]
    relations:
      fo_patterns: [sap.fo-pattern.source-access-governance]

