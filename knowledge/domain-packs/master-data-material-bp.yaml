pack_id: sap-master-data-material-bp-pack
title: SAP master data, material/product and business partner context pack
description: >
  Source-backed SAP Agent Context pack for representative master-data FO,
  field-mapping and migration questions. The pack is link-first: public SAP API
  and archived Field Atlas URLs are retained as pointers, while claims remain
  concise context written for agent retrieval.
ownership:
  owner: sap-agent-context
  review_strategy: >
    Keep this pack generic and public. Use exact public source/catalog pointers
    for API surfaces and mark tenant/customizing-sensitive assumptions as
    needs_verification rather than ready.
freshness_current: &freshness_current
  valid_from: 2026-06-23
  review_after: 2026-12-23
  expires_at: 2027-06-23
  retrieved_at: 2026-06-23
sap_api_business_partner: &sap_api_business_partner
  kind: public_url
  title: SAP Business Accelerator Hub - Business Partner API
  url: https://api.sap.com/api/API_BUSINESS_PARTNER/overview
  retrieved_at: 2026-06-23
  specificity: catalog_entry
  license_note: Link-first public SAP API catalog pointer; do not copy API specification text.
sap_api_product: &sap_api_product
  kind: public_url
  title: SAP Business Accelerator Hub - Product API
  url: https://api.sap.com/api/API_PRODUCT_SRV/overview
  retrieved_at: 2026-06-23
  specificity: catalog_entry
  license_note: Link-first public SAP API catalog pointer; do not copy API specification text.
field_atlas_source: &field_atlas_source
  kind: public_url
  title: SAP Field Atlas archived public seed
  url: https://github.com/viggomeesters/sap-field-atlas
  retrieved_at: 2026-06-23
  specificity: catalog_entry
  license_note: Archived MIT metadata repository used as provenance seed; keep URL pointers.
internal_source: &internal_source
  kind: internal_pattern
  title: Internal master-data FO pattern
  url: ""
  retrieved_at: 2026-06-23
  specificity: internal_pattern
  license_note: Internal-derived implementation pattern; no customer data or copied SAP documentation.
items:
  - id: sap.ref.api-business-partner
    title: Business Partner public catalog pointer
    kind: external_reference
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, business-partner, customer, supplier, field-mapping]
    used_for: [fo.source_traceability, fo.field_mapping]
    summary: >
      Public SAP Business Accelerator Hub pointer for Business Partner catalog
      surface review. Use it to verify release/API availability and field names
      before treating BP mappings as tenant-ready.
    freshness: *freshness_current
    source: *sap_api_business_partner
    requires_source_specificity: high
    release_applicability:
      edition: s4hana_cloud_public
      verification: Verify API package and entity availability for the target tenant and release.
    claims:
      - statement: Business partner, customer and supplier context should be verified against a catalog surface or tenant evidence before integration design.
        evidence: [https://api.sap.com/api/API_BUSINESS_PARTNER/overview]
    relations:
      objects: [sap.object.business-partner-core, sap.object.customer-master, sap.object.supplier-master]

