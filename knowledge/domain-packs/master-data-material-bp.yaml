  - id: sap.field-set.business-partner-core
    title: Business partner core identity fields
    kind: sap_field
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, business-partner, field-mapping, identity, duplicate-check]
    used_for: [fo.field_mapping, fo.test_data, fo.business_rules]
    summary: >
      Field-set context for BP identity and duplicate-check sensitive design:
      partner number, category, name/search attributes, role assignment and tax
      identifiers must be handled as release/tenant-verifiable fields.
    freshness: *freshness_current
    source: *sap_api_business_partner
    requires_source_specificity: high
    claims:
      - statement: BP identity mapping should include identifier, category, name/search data, role context and duplicate-check impact where applicable.
        evidence: [sap.ref.api-business-partner]
    relations:
      objects: [sap.object.business-partner-core]
      field_maps: [sap.field-map.business-partner-core-identity]
    field_definitions:
      - key: BusinessPartner.BusinessPartner
        description: Business-facing BP identifier; verify number range/internal-external assignment before migration.
        usage: Use as the primary BP identity anchor in FO mapping and duplicate-check narratives.
      - key: BusinessPartner.BusinessPartnerCategory
        description: Person/organization/group style categorization that can change required fields and validation.
        usage: Use to explain conditional mandatory fields and test-data variants.
      - key: BusinessPartner.SearchTerm
        description: Search attribute used by users and integrations to find the party.
        usage: Include in test data when duplicate detection or lookup behavior matters.
      - key: BusinessPartner.TaxNumber
        description: Tax identifier context that is often country-specific and validation-sensitive.
        usage: Mark as tenant/country verified before using it as a hard validation rule.

  - id: sap.field-set.customer-supplier-role-core
    title: Customer and supplier role extension fields
    kind: sap_field
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, business-partner, customer, supplier, company-code, procurement-org]
    used_for: [fo.field_mapping, fo.business_rules, fo.test_data]
    summary: >
      Field-set context for customer/supplier extensions of a BP: role,
      company-code, organization and payment/accounting attributes should be explicit when they affect process behavior.
    freshness: *freshness_current
    source: *sap_api_business_partner
    requires_source_specificity: high
    claims:
      - statement: Customer and supplier fields should be treated as role/extension context rather than as proof that the party identity itself changed.
        evidence: [sap.ref.api-business-partner]
    relations:
      objects: [sap.object.business-partner-core, sap.object.customer-master, sap.object.supplier-master]
      field_maps: [sap.field-map.bp-role-extension]
    field_definitions:
      - key: BusinessPartner.Role
        description: Business role or role-extension context used to determine customer/supplier usage.
        usage: Use to separate general BP identity from customer or supplier process enablement.
      - key: Customer.CompanyCode
        description: Company-code extension context for accounting/customer use.
        usage: Include when the FO affects FI posting, credit or account determination assumptions.
      - key: Customer.SalesOrganization
        description: Customer organization extension context for process behavior.
        usage: Include when customer master changes affect downstream process behavior.
      - key: Supplier.PurchasingOrganization
        description: Procurement organization extension context for supplier process behavior.
        usage: Include when supplier master data affects source-to-pay routing.
      - key: Supplier.PaymentTerms
        description: Payment-term context that affects AP/procurement process design.
        usage: Include as a verified field where payment behavior is in scope.

  - id: sap.field-set.product-master-core
    title: Product master core fields
    kind: sap_field
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, product, material-master, field-mapping, migration]
    used_for: [fo.field_mapping, migration.analysis, fo.test_data]
    summary: >
      Field-set context for product/material identity, type/category, base unit,
      product group and status. Use together with Field Atlas MARA/MATNR seed
      context for migration label mapping.
    freshness: *freshness_current
    source: *sap_api_product
    requires_source_specificity: high
    claims:
      - statement: Product mapping should keep product identifier, product type/category, unit and lifecycle/status assumptions explicit.
        evidence: [sap.ref.api-product, sap.field-set.core-master-data-identifiers]
    relations:
      objects: [sap.object.product-master, sap.object.material-master]
      field_maps: [sap.field-map.product-core-identity]
    field_definitions:
      - key: Product.Product
        description: Product/material identifier used as the product master anchor.
        usage: Map to product/material number labels and verify against migration template label conventions.
      - key: Product.ProductType
        description: Product type/category context that can drive required views and process behavior.
        usage: Include when FO scope changes material type, product category or process enablement.
      - key: Product.BaseUnit
        description: Base unit-of-measure context for quantity handling.
        usage: Include in migration/test data where unit conversion or quantity validation matters.
      - key: Product.ProductGroup
        description: Grouping/classification context used for reporting or process segmentation.
        usage: Include for analytics, defaults or business-rule segmentation.
      - key: Product.Status
        description: Lifecycle/status context that can block or allow downstream use.
        usage: Test active/inactive or blocked-product behavior when process availability is in scope.

  - id: sap.field-set.company-code-master-data-use
    title: Company-code use in master-data extensions
