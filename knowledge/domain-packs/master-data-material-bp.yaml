    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, company-code, business-partner, customer, supplier, field-mapping]
    used_for: [fo.field_mapping, fo.business_rules, migration.analysis]
    summary: >
      Field-set context for company-code use in customer and supplier extensions.
      Treat company code as customizing-controlled context that must be checked
      in the target system before migration or process design.
    freshness: *freshness_current
    source: *field_atlas_source
    claims:
      - statement: Company-code values are customizing-controlled and should be verified before being used as hard master-data migration or FO assumptions.
        evidence: [sap.field-set.core-master-data-identifiers, sap.object.company-code]
    relations:
      objects: [sap.object.company-code, sap.object.customer-master, sap.object.supplier-master]
      field_maps: [sap.field-map.bp-role-extension]
    field_definitions:
      - key: CompanyCode.BUKRS
        sap_structure: T001
        sap_field: BUKRS
        description: Company-code identifier used as organizational context for customer/supplier accounting extensions.
        usage: Verify target customizing and include it when master data affects FI/AP/AR process behavior.

  - id: sap.field-map.business-partner-core-identity
    title: Business partner identity and duplicate-check field map
    kind: field_map
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, business-partner, field-mapping, duplicate-check, governance]
    used_for: [fo.field_mapping, fo.business_rules, fo.test_data]
    summary: >
      Field-map pattern for BP creation/change FOs: map source party identifier,
      BP category, name/search attributes, tax number and duplicate candidate
      behavior before claiming a design is migration-ready.
    freshness: *freshness_current
    source: *sap_api_business_partner
    requires_source_specificity: high
    claims:
      - statement: A BP FO should define duplicate-check handling and source-vs-target identifier ownership, not only field labels.
        evidence: [sap.field-set.business-partner-core]
    relations:
      objects: [sap.object.business-partner-core]
      fields: [sap.field-set.business-partner-core]
    mapping_steps:
      - source: legacy_party_id
        target: BusinessPartner.BusinessPartner
        verification: Verify number range and internal/external assignment.
      - source: party_type
        target: BusinessPartner.BusinessPartnerCategory
        verification: Verify category-specific mandatory fields.
      - source: search_name
        target: BusinessPartner.SearchTerm
        verification: Use in duplicate and search tests.
      - source: tax_identifier
        target: BusinessPartner.TaxNumber
        verification: Verify country and tenant validation rules.

  - id: sap.field-map.bp-role-extension
    title: BP customer/supplier role extension field map
    kind: field_map
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
