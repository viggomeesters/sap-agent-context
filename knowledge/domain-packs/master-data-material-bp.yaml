  - id: sap.field-map.product-core-identity
    title: Product identity and classification field map
    kind: field_map
    status: active
    access: public
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, product, material-master, migration, field-mapping]
    used_for: [fo.field_mapping, migration.analysis, fo.test_data]
    summary: >
      Field-map pattern for product/material creation and migration FOs: map
      product number, product type/category, unit, group/classification and
      status with release-specific verification.
    freshness: *freshness_current
    source: *sap_api_product
    requires_source_specificity: high
    claims:
      - statement: Product FO mapping should not treat a migration template label as enough; it must tie the label to product identity and validation fields.
        evidence: [sap.ref.api-product, sap.field-map.product-number-migration-seed]
    relations:
      objects: [sap.object.product-master, sap.object.material-master]
      fields: [sap.field-set.product-master-core, sap.field-set.core-master-data-identifiers]
    mapping_steps:
      - source: product_number
        target: Product.Product
        verification: Compare against migration template Product Number and Field Atlas MARA/MATNR context.
      - source: product_type
        target: Product.ProductType
        verification: Verify required views and process enablement.
      - source: base_unit
        target: Product.BaseUnit
        verification: Include UoM conversion/validation test data.
      - source: product_group
        target: Product.ProductGroup
        verification: Verify reporting/defaulting assumptions.
      - source: lifecycle_status
        target: Product.Status
        verification: Test downstream process availability or blocking behavior.

  - id: sap.test-pattern.business-partner-master-data-governance
    title: Business partner master-data governance test pattern
    kind: test_pattern
    status: active
    access: internal_derived
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, business-partner, customer, supplier, test-scenarios]
    used_for: [fo.test_scenarios, fo.quality_gate, fo.test_data]
    summary: >
      Test pattern for BP master-data FOs covering identity, duplicate, role
      extension, authorization and negative validation paths.
    freshness: *freshness_current
    source: *internal_source
    claims:
      - statement: BP master-data tests should prove both party identity and role-extension behavior rather than only successful creation.
        evidence: [sap.field-map.business-partner-core-identity, sap.field-map.bp-role-extension]
    relations:
      objects: [sap.object.business-partner-core, sap.object.customer-master, sap.object.supplier-master]
      field_maps: [sap.field-map.business-partner-core-identity, sap.field-map.bp-role-extension]
    test_scenarios:
      - level: acceptance
        case: Create BP with valid category, search term and required role extension.
        expected: BP identity and selected customer/supplier extension are available for the target process.
      - level: negative
        case: Submit a BP candidate missing role-extension or company-code data required by the FO.
        expected: The design blocks or routes to enrichment with a clear missing-data reason.
      - level: negative
        case: Candidate matches an existing BP by search/tax identifier.
        expected: Duplicate-handling rule is triggered and visible in the FO.
      - level: authorization
        case: User can create BP identity but lacks customer/supplier extension authorization.
        expected: FO states the role/access boundary and expected exception.

  - id: sap.test-pattern.product-master-migration-validation
    title: Product master migration validation test pattern
    kind: test_pattern
    status: active
    access: internal_derived
    requires_login: false
    sap_product: s4hana_cloud_public
    topics: [master-data, product, material-master, migration, test-scenarios]
    used_for: [fo.test_scenarios, fo.quality_gate, migration.analysis]
    summary: >
      Test pattern for product/material master migration and FO validation,
      covering identifier mapping, product type, unit, status and downstream
      process availability.
    freshness: *freshness_current
    source: *internal_source
    claims:
      - statement: Product migration tests should prove field identity and validation behavior, not only that a product number is present.
        evidence: [sap.field-map.product-core-identity]
    relations:
      objects: [sap.object.product-master, sap.object.material-master]
      field_maps: [sap.field-map.product-core-identity, sap.field-map.product-number-migration-seed]
    test_scenarios:
      - level: acceptance
        case: Import product with product number, type, base unit and group populated.
        expected: Product is usable in the intended process after release/tenant verification.
      - level: negative
        case: Product has missing or invalid base unit.
        expected: Migration/design blocks with a precise unit validation issue.
      - level: negative
        case: Product type or status does not allow downstream use.
        expected: FO captures the blocker and expected remediation path.
      - level: regression
        case: Product Number label maps to technical product/material identifier.
        expected: Mapping remains tied to Field Atlas/Product API evidence and does not drift to an unrelated label.
