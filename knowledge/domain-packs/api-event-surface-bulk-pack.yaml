- id: sap.bulk.api.sales-order.rule
  title: Sales Order API interface decision rule
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - sales-order
  - api-surface
  - payload
  - public-api
  - interface-readiness
  - quality-gate
  used_for:
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule for Sales Order API: do not claim interface readiness unless business key, payload fields,
    status, error owner and privacy boundary are explicit.'
  freshness: *id001
  source: &id004
    kind: internal_pattern
    title: Internal Sales Order API interface pattern
    url: ''
    retrieved_at: '2026-06-23'
    specificity: internal_pattern
    license_note: Internal-derived generic interface pattern; no customer data, no tenant hostnames, no copied SAP
      documentation.
  claims:
  - statement: Sales Order API context should identify business key, field semantics, lifecycle status, error owner
      and release-specific verification before an agent uses it in FO or interface design.
    evidence:
    - sap.bulk.api.sales-order.ref
  relations:
    objects:
    - sap.bulk.api.sales-order.object
    field_maps:
    - sap.bulk.api.sales-order.field-map
  rules:
  - if: business key or lifecycle status is missing
    then: block interface-ready claim
    outcome: request API/entity and tenant verification
  - if: payload includes credential, token, tenant hostname or secret literal
    then: reject public bundle evidence
    outcome: replace with synthetic placeholder and private handoff
