  - quality-gate
  used_for:
  - fo.test_scenarios
  - fo.quality_gate
  summary: 'Test pattern for Sales Order API: payload mapping, status handling, error ownership, idempotency/reconciliation
    and private-data boundary.'
  freshness: *id001
  source: *id004
  claims:
  - statement: Sales Order API context should identify business key, field semantics, lifecycle status, error owner
      and release-specific verification before an agent uses it in FO or interface design.
    evidence:
    - sap.bulk.api.sales-order.ref
  relations:
    objects:
    - sap.bulk.api.sales-order.object
    field_maps:
    - sap.bulk.api.sales-order.field-map
  test_scenarios:
  - name: Sales Order API payload mapping smoke
    given: A synthetic SalesOrder payload with business key and status fields only.
    when: An agent builds an FO/interface bundle.
    then: The bundle cites public source pointers and requests tenant-specific endpoint/auth evidence separately.
  - name: Sales Order API secret boundary
    given: A prompt contains token, hostname or credential-shaped text.
    when: The agent prepares public context.
    then: The public bundle rejects or redacts private values and keeps only generic field semantics.
