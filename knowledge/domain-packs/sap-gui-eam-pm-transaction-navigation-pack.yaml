  - nnie01
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.test_scenarios
  summary: 'SAP GUI command-field prefixes such as /n and /o modify navigation behavior: /n starts a transaction
    in the current session, /o opens/starts a transaction in another session/window where available. They are prefixes,
    not part of the transaction code. Confidence: medium internal_derived; verify in target GUI/client behavior.
    Supports Dutch consultant questions such as welke transacties om equipment te openen/zoeken in SAP GUI, including
    NIE01 versus /nIE01 correction.'
  freshness: *id001
  source: *id002
  claims:
  - statement: /nIE01 means command prefix /n plus transaction IE01; NIE01 is not the transaction code. /oIE03 means
      /o prefix plus IE03, not a separate OIE03 tcode.
    evidence:
    - sap.rule.eam.pm.command-prefix-not-tcode
    - sap.ref.eam.pm.gui-help-gated
  relations:
    apps:
    - sap.app.eam.pm.ie01
    - sap.app.eam.pm.ie02
    - sap.app.eam.pm.ie03
    - sap.app.eam.pm.ih08
- id: sap.rule.eam.pm.command-prefix-not-tcode
  title: SAP GUI /n and /o prefixes are not transaction-code characters
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - command-field
  - /n
  - /o
  - nie01
  - /nie01
  - /nie03
  - transaction-prefix
  - fake-tcode
  - welke
  - transacties
  - openen
  - zoeken
  - equipment-openen
  - sap-gui-vraag
  - nnie01
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule: treat /n and /o as command-field prefixes. Do not normalize NIE01, N/IE01 or OIE03 as
    real transaction codes; explain prefix plus transaction instead. Supports Dutch consultant questions such as
    welke transacties om equipment te openen/zoeken in SAP GUI, including NIE01 versus /nIE01 correction. NIE01
    is not the transaction code; /nIE01 is /n prefix plus IE01.'
  freshness: *id001
  source: *id002
  rules:
  - if: question says /nIE01 or /n IE01
    then: explain /n command prefix plus IE01 transaction
    outcome: ready with prefix caveat
  - if: question says NIE01 as a standalone transaction
    then: do not claim NIE01 is a valid transaction
    outcome: answer that likely means /n + IE01 or request clarification
  - if: question says /oIE03
    then: explain /o opens IE03 in another session/window where available
    outcome: ready with GUI/client caveat
  claims:
  - statement: SAP GUI prefix semantics prevent fake transaction-code answers such as treating NIE01 as a distinct
      tcode.
    evidence:
    - sap.object.eam.pm.sap-gui-command-field
  relations:
    apps:
    - sap.app.eam.pm.ie01
    - sap.app.eam.pm.ie02
    - sap.app.eam.pm.ie03
    - sap.app.eam.pm.ih08
- id: sap.test-pattern.eam.pm-transaction-navigation
  title: SAP GUI EAM/PM transaction navigation test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - eam
  - ie01
  - ie02
  - ie03
  - ih08
  - /n
  - /o
  - nie01
  - test-pattern
  - welke
  - transacties
  - openen
  - zoeken
  - equipment-openen
  - sap-gui-vraag
  - nnie01
  used_for:
  - fo.test_scenarios
  - fo.navigation
  - fo.quality_gate
  summary: 'Test pattern: transaction navigation answers must identify IE01 create, IE02 change, IE03 display/open,
    IH08 list/search and explain /n and /o as prefixes, while rejecting fake standalone NIE01. Supports Dutch consultant
    questions such as welke transacties om equipment te openen/zoeken in SAP GUI, including NIE01 versus /nIE01
    correction.'
  freshness: *id001
  source: *id002
  test_scenarios:
  - name: Equipment transaction list
    given: A consultant asks which SAP GUI transactions open/search equipment.
    when: Bundle is built for IE01 IE02 IE03 IH08 equipment transaction.
    then: The answer includes IE01, IE02, IE03, IH08 with create/change/display/list-search semantics.
  - name: NIE01 prefix ambiguity
    given: A consultant asks whether NIE01 or /nNIE01 is correct.
    when: Bundle is built for NIE01 /nIE01.
    then: The answer says /n + IE01 is a prefix plus transaction, not a distinct NIE01 transaction.
  claims:
  - statement: Navigation tests protect against wrong tcode semantics and first-green hallucinations.
    evidence:
    - sap.rule.eam.pm.command-prefix-not-tcode
  relations:
    apps:
    - sap.app.eam.pm.ie01
    - sap.app.eam.pm.ie02
    - sap.app.eam.pm.ie03
    - sap.app.eam.pm.ih08
