- id: sap.rule.material-master-tenant-view-caveat
  title: Material master view/configuration tenant caveat
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - material-master
  - views
  - tenant-caveat
  - mandatory-fields
  - configuration
  - do-not-invent
  used_for:
  - fo.business_rules
  - fo.quality_gate
  - fo.field_mapping
  summary: 'Decision rule: answer material master view questions with source-labelled starter context, but do not
    invent tenant-specific mandatory fields, material types, valuation classes, MRP settings or sales/purchasing
    view requirements.'
  freshness: *id001
  source: *id002
  claims:
  - statement: Material view/configuration answers must include tenant/release verification when exact fields, material
      types, valuation classes or MRP settings are requested.
    evidence:
    - sap.ref.material-product-master-learning
    - sap.object.material-product-master-anchor
  relations:
    objects:
    - sap.object.material-product-master-anchor
    - sap.object.material-plant-data
    - sap.object.material-valuation-accounting
  rules:
  - if: question asks broad material master views
    then: answer with scoped starter view anchors and tenant caveat
    outcome: ready only when precision is high enough
  - if: question asks exact material type, valuation class, MRP type or mandatory field
    then: do not invent tenant-specific values
    outcome: request tenant/release verification
