    specificity: internal_pattern
    license_note: Internal-derived consultant knowledge; verify in target SAP tenant because screens, statuses and
      profiles can be configured.
  test_scenarios:
  - name: EAM/PM source-governance smoke
    given: A question about IE03 equipment status or transaction usage.
    when: A bundle is selected.
    then: The bundle includes source pointers and a tenant-verification caveat where consultant-derived or configurable
      behavior is used.
  claims:
