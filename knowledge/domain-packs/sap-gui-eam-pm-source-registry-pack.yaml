- id: sap.rule.eam.pm.source-confidence-policy
  title: SAP GUI EAM/PM source confidence policy
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - eam
  - equipment
  - source-confidence
  - tenant-verification
  used_for:
  - fo.source_traceability
  - fo.quality_gate
  - fo.navigation
  summary: 'Decision rule: public/gated references can support source traceability, but transaction usage and status/profile
    semantics must be caveated when based on consultant knowledge or tenant-configurable behavior.'
  freshness: *id001
  source:
    kind: internal_pattern
    title: Internal source confidence policy
    url: ''
    retrieved_at: '2026-06-23'
    specificity: internal_pattern
    license_note: Internal-derived consultant knowledge; verify in target SAP tenant because screens, statuses and
      profiles can be configured.
  rules:
  - if: answer uses SAP GUI transaction or status semantics without a public/gated pointer or internal_derived caveat
    then: block ready claim
    outcome: add provenance/caveat or return needs_curation
  - if: answer claims a tenant-specific status profile/user status without tenant evidence
    then: block universality claim
    outcome: state tenant verification caveat
  claims:
  - statement: EAM/PM source confidence requires provenance plus caveats for tenant-specific screens/status profiles.
    evidence:
    - sap.ref.eam.pm.sap-help-status-management
    - sap.ref.eam.pm.sap-for-me-gated-notes
  relations:
    source_references:
    - sap.ref.eam.pm.sap-help-equipment-master
    - sap.ref.eam.pm.sap-help-status-management
    - sap.ref.eam.pm.sap-help-functional-location
    - sap.ref.eam.pm.sap-community-user-status-equipment
    - sap.ref.eam.pm.sap-community-system-status-equipment
    - sap.ref.eam.pm.transaction-code-public-cross-check
    - sap.ref.eam.pm.sap-for-me-gated-notes
