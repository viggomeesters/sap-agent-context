- id: sap.rule.eam-spares-stock-availability-caveat
  title: EAM spares stock/availability caveat
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - eam
  - pm
  - spare
  - stock
  - availability
  - mmbe
  - reservation
  - plant
  - storage-location
  - caveat
  used_for:
  - fo.business_rules
  - fo.quality_gate
  - fo.test_scenarios
  summary: 'Decision rule: answer spare-parts stock/availability questions by separating material master identity,
    plant/storage stock, planned order components and tenant-specific reservation/availability checking. Do not
    promise stock exists without a system check.'
  freshness: *id001
  source: *id002
  claims:
  - statement: Spare-part availability answers must separate master-data/BOM/order-component context from live stock
      or reservation evidence.
    evidence:
    - sap.app.material.mmbe
    - sap.object.eam-maintenance-order-component
  relations:
    apps:
    - sap.app.material.mmbe
    objects:
    - sap.object.eam-spare-part-material
    - sap.object.eam-maintenance-order-component
  rules:
  - if: question asks whether a spare is available
    then: state that live stock/availability requires tenant/system check such as stock overview or order component
      availability
    outcome: ready with caveat
  - if: question asks how equipment BOM relates to material master
    then: explain BOM component link to material/product and require BOM usage/category/validity verification
    outcome: ready with tenant caveat
  - if: question asks exact storage location, movement type or reservation behavior
    then: do not invent tenant values
    outcome: needs verification/fail closed
- id: sap.field-map.eam-spares-bom-material-link
  title: EAM BOM component to material link mapping
  kind: field_map
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - eam
  - pm
  - bom
  - material
  - component
  - field-map
  - equipment-bom
  - functional-location-bom
  used_for:
  - fo.field_mapping
  - migration.analysis
  - fo.business_rules
  summary: 'Field-map starter: map the business concept spare/component to material/product identity and technical-object
    BOM context; keep BOM usage/category/validity and item-category details as tenant-verified assumptions.'
  freshness: *id001
  source: *id002
  claims:
  - statement: 'Field-map starter: map the business concept spare/component to material/product identity and technical-object
      BOM context; keep BOM usage/category/validity and item-category details as tenant-verified assumptions.'
    evidence:
    - sap.object.material-product-master-anchor
    - sap.object.eam-equipment
  relations:
    objects:
    - sap.object.eam-equipment-bom
    - sap.object.eam-functional-location-bom
    - sap.object.eam-spare-part-material
    fields:
    - sap.field-set.product-master-core
  mapping_steps:
  - source: Spare/component business label
    target: Material/Product identity
    rule: Resolve to material/product master identity before using it as a BOM/order component.
  - source: Equipment or functional-location spare structure
    target: Technical-object BOM component
    rule: Verify BOM usage/category, validity and alternatives in the tenant.
  - source: Maintenance order planned material
    target: Order component / reservation context
    rule: Verify storage location, availability checking and goods issue behavior in the tenant.
- id: sap.test-pattern.eam-spares-bom-links
  title: EAM spares/BOM/material link test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - eam
  - pm
  - bom
  - spare
  - material
  - component
  - equipment-bom
  - functional-location-bom
  - maintenance-order
  - test-pattern
  used_for:
  - fo.test_scenarios
  - fo.quality_gate
  - fo.field_mapping
  summary: 'Test pattern: representative questions about equipment BOM, functional-location BOM, spare parts, order
    components and stock availability must select material, EAM object and caveat items without claiming live stock
    or tenant configuration.'
  freshness: *id001
  source: *id002
  claims:
  - statement: 'Test pattern: representative questions about equipment BOM, functional-location BOM, spare parts,
      order components and stock availability must select material, EAM object and caveat items without claiming
      live stock or tenant configuration.'
    evidence:
    - sap.object.material-product-master-anchor
    - sap.object.eam-equipment
  relations:
    objects:
    - sap.object.eam-spare-part-material
    - sap.object.eam-equipment-bom
    - sap.object.eam-maintenance-order-component
  test_scenarios:
  - name: Equipment BOM to material master
    given: A consultant asks how equipment BOM spare parts relate to material master.
    when: A context bundle is built for EAM BOM/spares.
    then: The bundle selects equipment BOM, spare material and mapping/caveat items.
  - name: Stock availability caveat
    given: A consultant asks if a spare is in stock.
    when: A context bundle is built for spare stock availability.
    then: The answer requires a live tenant/system stock or reservation check and does not invent stock.
