- id: sap.rule.material-gui-prefix-not-tcode
  title: Material SAP GUI /n and /o prefixes are not transaction-code characters
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - material
  - command-field
  - /n
  - /o
  - nmm03
  - /nmm03
  - mm03
  - fake-tcode
  - prefix
  - welke
  - transactie
  - openen
  - nmm03-correctie
  used_for:
  - fo.navigation
  - fo.business_rules
  - fo.quality_gate
  summary: 'Decision rule: treat /n and /o as SAP GUI command-field prefixes. NMM03 is not the transaction code;
    /nMM03 means /n prefix plus MM03. /oMM03 means /o prefix plus MM03 where available. Confidence: medium internal_derived;
    verify target GUI/client behavior. Supports Dutch consultant questions such as welke transactie om material
    te openen NMM03 /nMM03.'
  freshness: *id001
  source: *id002
  rules:
  - if: question says /nMM03 or /n MM03
    then: explain /n command prefix plus MM03 transaction
    outcome: ready with prefix caveat
  - if: question says NMM03 as a standalone transaction
    then: do not claim NMM03 is a valid transaction
    outcome: answer that it likely means /n + MM03 or request clarification
  - if: question asks /oMM03
    then: explain /o prefix plus MM03 in another session/window where available
    outcome: ready with GUI/client caveat
  claims:
  - statement: SAP GUI prefix semantics prevent fake material transaction-code answers such as treating NMM03 as
      a distinct tcode.
    evidence:
    - sap.app.material.mm03
  relations:
    apps:
    - sap.app.material.mm01
    - sap.app.material.mm02
    - sap.app.material.mm03
    - sap.app.material.mm60
    - sap.app.material.mmbe
- id: sap.test-pattern.material-gui-navigation
  title: Material SAP GUI transaction navigation test pattern
  kind: test_pattern
  status: active
  access: internal_derived
  requires_login: false
  sap_product: cross_sap
  topics:
  - sap-gui
  - material
  - mm01
  - mm02
  - mm03
  - mm60
  - mmbe
  - /n
  - /o
  - nmm03
  - test-pattern
  - welke
  - transactie
  - openen
  - nmm03-correctie
  used_for:
  - fo.test_scenarios
  - fo.navigation
  - fo.quality_gate
  summary: 'Test pattern: material navigation answers must identify MM01 create, MM02 change, MM03 display, MM60
    list/search and MMBE stock overview, while correcting NMM03 versus /nMM03. Supports Dutch consultant questions
    such as welke transactie om material te openen NMM03 /nMM03.'
  freshness: *id001
  source: *id002
  test_scenarios:
  - name: Material transaction list
    given: A consultant asks which SAP GUI transactions open/search material.
    when: Bundle is built for MM01 MM02 MM03 MM60 MMBE material transaction.
    then: The answer includes create/change/display/list-search/stock overview semantics.
  - name: NMM03 prefix ambiguity
    given: A consultant asks whether NMM03 or /nMM03 is correct.
    when: Bundle is built for NMM03 /nMM03.
    then: The answer says /n + MM03 is a prefix plus transaction, not a distinct NMM03 transaction.
  claims:
  - statement: Navigation tests protect against wrong material tcode semantics and first-green hallucinations.
    evidence:
    - sap.rule.material-gui-prefix-not-tcode
  relations:
    apps:
    - sap.app.material.mm01
    - sap.app.material.mm02
    - sap.app.material.mm03
    - sap.app.material.mm60
    - sap.app.material.mmbe
