- id: sap.rule.eam.pm.system-vs-user-status-distinction
  title: System status vs user status distinction
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - sap-gui
  - eam
  - system-status
  - user-status
  - status-profile
  - tenant-verification
  used_for:
  - fo.business_rules
  - fo.navigation
  - fo.quality_gate
  summary: 'Decision rule: answer system status as SAP/system-controlled lifecycle state; answer user status as
    status-profile/customizing-dependent; include tenant verification caveat for user status/profile behavior.'
  freshness: *id001
  source: *id002
  rules:
  - if: question asks difference between system status and user status
    then: select system-status, user-status and status-profile anchors
    outcome: answer with distinction plus tenant caveat
  - if: question asks exact user status values/profile names
    then: do not invent values
    outcome: request tenant verification or provide caveated generic answer
  claims:
  - statement: Status answers must separate system status, user status and status profile to avoid fake SAP universality.
    evidence:
    - sap.object.eam-system-status
    - sap.object.eam-user-status
    - sap.object.eam-status-profile
  relations:
    objects:
    - sap.object.eam-system-status
    - sap.object.eam-user-status
    - sap.object.eam-status-profile
- id: sap.rule.eam.pm.tenant-status-profile-caveat
  title: Tenant status profile verification caveat
  kind: decision_rule
  status: active
  access: internal_derived
  requires_login: false
  sap_product: s4hana_cloud_public
  topics:
  - sap-gui
  - eam
  - status-profile
  - tenant-verification
  - user-status
  - configuration-caveat
  used_for:
  - fo.business_rules
  - fo.quality_gate
  - fo.source_traceability
  summary: 'Decision rule: status profile/user status behavior is tenant-configurable; public repo context can explain
    the distinction but cannot claim customer-specific profile setup without tenant evidence.'
  freshness: *id001
  source: *id002
  rules:
  - if: answer depends on status profile settings, allowed business transactions or specific user statuses
    then: add tenant verification caveat
    outcome: ready only as generic consultant guidance, not tenant proof
  claims:
  - statement: Equipment user status values, allowed business transactions and status profile names are tenant-configurable,
      so a public answer must request target-system verification before treating them as implementation-ready.
    evidence:
    - sap.ref.eam.pm.sap-for-me-gated-notes
    - sap.ref.eam.pm.gui-help-gated
  relations:
    objects:
    - sap.object.eam-status-profile
    - sap.object.eam-user-status
