name: CI
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - run: uv run sap-fo-kb validate
      - run: uv run sap-fo-kb audit-completeness
      - run: uv run sap-fo-kb evaluate-fixtures
      - run: uv run pytest -q
      - run: uv run ruff check .
